version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - .:/app
    command: python -m uvicorn backend_api.app:app --host 0.0.0.0 --port 8000

  # Note: Frontend can be added here if desired, but depends on local setup
  # frontend:
  #   build: ./aircraft_simulator/frontend
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - NEXT_PUBLIC_API_BASE=http://localhost:8000
